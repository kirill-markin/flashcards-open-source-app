name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'apps/auth/**'
      - 'apps/backend/**'
      - 'apps/web/**'
      - 'db/**'
      - 'infra/**'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-aws
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  STACK_NAME: FlashcardsOpenSourceApp

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: |
            api/package-lock.json
            apps/auth/package-lock.json
            apps/backend/package-lock.json
            apps/web/package-lock.json
            infra/aws/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: |
          npm ci --prefix api
          npm ci --prefix apps/auth
          npm ci --prefix apps/backend
          npm ci --prefix apps/web
          npm ci --prefix infra/aws

      - name: Bundle OpenAPI spec
        run: npm run bundle --prefix api

      - name: CDK deploy
        working-directory: infra/aws
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          cat > cdk.context.local.json <<CTXEOF
          {
            "region": "${{ vars.AWS_REGION }}",
            "domainName": "${{ vars.CDK_DOMAIN_NAME }}",
            "apiCertificateArn": "${{ vars.CDK_API_CERTIFICATE_ARN }}",
            "authCertificateArn": "${{ vars.CDK_AUTH_CERTIFICATE_ARN }}",
            "webCertificateArnUsEast1": "${{ vars.CDK_WEB_CERTIFICATE_ARN_US_EAST_1 }}",
            "apexRedirectCertificateArnUsEast1": "${{ vars.CDK_APEX_REDIRECT_CERTIFICATE_ARN_US_EAST_1 }}",
            "resendApiKeySecretArn": "${{ vars.CDK_RESEND_API_KEY_SECRET_ARN }}",
            "resendSenderEmail": "${{ vars.CDK_RESEND_SENDER_EMAIL }}",
            "openAiApiKeySecretArn": "${{ vars.CDK_OPENAI_API_KEY_SECRET_ARN }}",
            "anthropicApiKeySecretArn": "${{ vars.CDK_ANTHROPIC_API_KEY_SECRET_ARN }}",
            "langfusePublicKeySecretArn": "${{ vars.CDK_LANGFUSE_PUBLIC_KEY_SECRET_ARN }}",
            "langfuseSecretKeySecretArn": "${{ vars.CDK_LANGFUSE_SECRET_KEY_SECRET_ARN }}",
            "langfuseBaseUrl": "${{ vars.CDK_LANGFUSE_BASE_URL }}",
            "demoEmailDostip": "${{ vars.CDK_DEMO_EMAIL_DOSTIP }}",
            "demoPasswordSecretArn": "${{ vars.CDK_DEMO_PASSWORD_SECRET_ARN }}",
            "guestAiWeightedMonthlyTokenCap": "${{ vars.CDK_GUEST_AI_WEIGHTED_MONTHLY_TOKEN_CAP }}",
            "githubOidcProviderArn": "arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com",
            "alertEmail": "${{ vars.CDK_ALERT_EMAIL }}",
            "githubRepo": "${{ vars.CDK_GITHUB_REPO }}"
          }
          CTXEOF
          npx cdk deploy --all --require-approval never

      - name: Check demo Cognito users
        run: bash scripts/check-demo-cognito-users.sh --stack-name ${{ env.STACK_NAME }} --region ${{ env.AWS_REGION }}

      - name: Run database migrations
        run: bash scripts/migrate-aws.sh --stack-name ${{ env.STACK_NAME }}

      - name: Check API health
        run: bash scripts/check-api-health.sh --stack-name ${{ env.STACK_NAME }}

      - name: Check public API routes
        run: bash scripts/check-public-endpoints.sh --stack-name ${{ env.STACK_NAME }}

      - name: Build web app
        run: npm run build --prefix apps/web

      - name: Deploy web assets
        run: bash scripts/deploy-web.sh --stack-name ${{ env.STACK_NAME }}

      - name: Check public custom domains
        run: bash scripts/check-public-endpoints.sh --stack-name ${{ env.STACK_NAME }}

      - name: Migration reminder
        if: github.event_name == 'workflow_dispatch'
        run: echo "::warning::Migrations changed. Run scripts/migrate.sh against target database manually or via your migration pipeline."

      - name: Summarize deployed release
        run: |
          {
            echo "## Production deploy"
            echo ""
            echo "- Deployed SHA: \`${GITHUB_SHA}\`"
            echo "- Web post-deploy smoke: pending next job"
            echo "- Run details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "${GITHUB_STEP_SUMMARY}"

  web-post-deploy-smoke:
    name: Web post-deploy smoke
    needs: deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci --prefix apps/web

      - name: Build web app for live smoke
        env:
          VITE_APP_BASE_URL: https://app.flashcards-open-source-app.com
          VITE_API_BASE_URL: https://api.flashcards-open-source-app.com/v1
          VITE_AUTH_BASE_URL: https://auth.flashcards-open-source-app.com
        run: npm run build --prefix apps/web

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run live web smoke test
        id: live_smoke
        working-directory: apps/web
        env:
          FLASHCARDS_E2E_APP_BASE_URL: https://app.flashcards-open-source-app.com
          FLASHCARDS_E2E_AUTH_BASE_URL: https://auth.flashcards-open-source-app.com
          FLASHCARDS_LIVE_REVIEW_EMAIL: google-review@example.com
        run: |
          set -euo pipefail

          cert_dir="${RUNNER_TEMP}/web-live-e2e-cert"
          cert_path="${cert_dir}/app.flashcards-open-source-app.com.crt"
          key_path="${cert_dir}/app.flashcards-open-source-app.com.key"
          server_log_path="${RUNNER_TEMP}/web-live-e2e-server.log"

          mkdir -p "${cert_dir}"

          openssl req \
            -x509 \
            -newkey rsa:2048 \
            -sha256 \
            -nodes \
            -days 1 \
            -subj "/CN=app.flashcards-open-source-app.com" \
            -addext "subjectAltName=DNS:app.flashcards-open-source-app.com" \
            -keyout "${key_path}" \
            -out "${cert_path}"

          printf '127.0.0.1 app.flashcards-open-source-app.com\n' | sudo tee -a /etc/hosts >/dev/null

          sudo env PATH="${PATH}" node scripts/serve-dist-https.mjs \
            --host 0.0.0.0 \
            --port 443 \
            --dir dist \
            --cert "${cert_path}" \
            --key "${key_path}" >"${server_log_path}" 2>&1 &
          server_pid=$!

          cleanup() {
            sudo kill "${server_pid}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl --silent --show-error --fail --insecure https://app.flashcards-open-source-app.com/ >/dev/null; then
              break
            fi
            sleep 1
          done

          curl --silent --show-error --fail --insecure https://app.flashcards-open-source-app.com/ >/dev/null
          npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-playwright-report
          if-no-files-found: ignore
          path: apps/web/playwright-report

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-playwright-test-results
          if-no-files-found: ignore
          path: apps/web/test-results

      - name: Summarize smoke result
        if: always()
        run: |
          {
            echo "## Web post-deploy smoke"
            echo ""
            echo "- Deployed SHA: \`${GITHUB_SHA}\`"
            echo "- Result: \`${{ steps.live_smoke.outcome }}\`"
            echo "- Artifacts: \`web-playwright-report\`, \`web-playwright-test-results\`"
            echo "- Run details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "${GITHUB_STEP_SUMMARY}"

  deploy-summary:
    name: Deploy summary
    if: always()
    needs:
      - deploy
      - web-post-deploy-smoke
    runs-on: ubuntu-24.04

    steps:
      - name: Summarize workflow outcome
        run: |
          {
            echo "## Deploy workflow summary"
            echo ""
            echo "- Deployed SHA: \`${GITHUB_SHA}\`"
            echo "- Deploy job: \`${{ needs.deploy.result }}\`"
            echo "- Web post-deploy smoke: \`${{ needs.web-post-deploy-smoke.result }}\`"
            echo "- Artifacts: \`web-playwright-report\`, \`web-playwright-test-results\`"
            echo "- Run details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "${GITHUB_STEP_SUMMARY}"
