name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'apps/auth/**'
      - 'apps/backend/**'
      - 'apps/web/**'
      - 'db/**'
      - 'infra/**'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-aws
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  STACK_NAME: FlashcardsOpenSourceApp

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: changes
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            migrations:
              - 'db/migrations/**'
              - 'db/views/**'
              - 'scripts/migrate.sh'

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: |
            api/package-lock.json
            apps/auth/package-lock.json
            apps/backend/package-lock.json
            apps/web/package-lock.json
            infra/aws/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: |
          npm ci --prefix api
          npm ci --prefix apps/auth
          npm ci --prefix apps/backend
          npm ci --prefix apps/web
          npm ci --prefix infra/aws

      - name: Bundle OpenAPI spec
        run: npm run bundle --prefix api

      - name: CDK deploy
        working-directory: infra/aws
        env:
          DEMO_EMAIL_DOSTIP: ${{ secrets.DEMO_EMAIL_DOSTIP }}
          DEMO_PASSWORD_DOSTIP: ${{ secrets.DEMO_PASSWORD_DOSTIP }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          cat > cdk.context.local.json <<CTXEOF
          {
            "region": "${{ vars.AWS_REGION }}",
            "domainName": "${{ vars.CDK_DOMAIN_NAME }}",
            "apiCertificateArn": "${{ secrets.CDK_API_CERTIFICATE_ARN }}",
            "authCertificateArn": "${{ secrets.CDK_AUTH_CERTIFICATE_ARN }}",
            "webCertificateArnUsEast1": "${{ secrets.CDK_WEB_CERTIFICATE_ARN_US_EAST_1 }}",
            "sesSenderEmail": "${{ vars.CDK_SES_SENDER_EMAIL }}",
            "openAiApiKeySecretArn": "${{ vars.CDK_OPENAI_API_KEY_SECRET_ARN }}",
            "anthropicApiKeySecretArn": "${{ vars.CDK_ANTHROPIC_API_KEY_SECRET_ARN }}",
            "githubOidcProviderArn": "arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com",
            "alertEmail": "${{ vars.CDK_ALERT_EMAIL }}",
            "githubRepo": "${{ vars.CDK_GITHUB_REPO }}"
          }
          CTXEOF
          npx cdk deploy --all --require-approval never

      - name: Run database migrations
        run: bash scripts/migrate-aws.sh --stack-name ${{ env.STACK_NAME }}

      - name: Check API health
        run: bash scripts/check-api-health.sh --stack-name ${{ env.STACK_NAME }}

      - name: Check public API routes
        run: bash scripts/check-public-endpoints.sh --stack-name ${{ env.STACK_NAME }}

      - name: Build web app
        run: npm run build --prefix apps/web

      - name: Deploy web assets
        run: bash scripts/deploy-web.sh --stack-name ${{ env.STACK_NAME }}

      - name: Check public custom domains
        run: bash scripts/check-public-endpoints.sh --stack-name ${{ env.STACK_NAME }}

      - name: Migration reminder
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.migrations == 'true'
        run: echo "::warning::Migrations changed. Run scripts/migrate.sh against target database manually or via your migration pipeline."
