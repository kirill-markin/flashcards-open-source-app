name: Main Release Orchestrator

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: main-release
  cancel-in-progress: false

permissions:
  actions: write
  checks: read
  contents: read
  id-token: write
  statuses: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  STACK_NAME: FlashcardsOpenSourceApp

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-24.04
    outputs:
      android_changed: ${{ steps.detect.outputs.android_changed }}
      aws_changed: ${{ steps.detect.outputs.aws_changed }}
      db_migrations_changed: ${{ steps.detect.outputs.db_migrations_changed }}
      changed_files: ${{ steps.detect.outputs.changed_files }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: detect
        env:
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          changed_files_path="${RUNNER_TEMP}/changed-files.txt"
          before_sha="${PUSH_BEFORE_SHA:-}"

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]] && [[ -n "${before_sha}" ]] && [[ "${before_sha}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --name-only "${before_sha}" "${GITHUB_SHA}" > "${changed_files_path}"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --name-only HEAD^ HEAD > "${changed_files_path}"
          else
            git ls-files > "${changed_files_path}"
          fi

          android_changed=false
          if grep -Eq '^apps/android/' "${changed_files_path}"; then
            android_changed=true
          fi

          aws_changed=false
          if grep -Eq '^(api/|apps/auth/|apps/backend/|apps/web/|db/|infra/|scripts/|\.github/workflows/(ci|deploy)\.yml$)' "${changed_files_path}"; then
            aws_changed=true
          fi

          db_migrations_changed=false
          if grep -Eq '^db/migrations/' "${changed_files_path}"; then
            db_migrations_changed=true
          fi

          {
            echo "android_changed=${android_changed}"
            echo "aws_changed=${aws_changed}"
            echo "db_migrations_changed=${db_migrations_changed}"
            echo 'changed_files<<EOF'
            cat "${changed_files_path}"
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Summarize changed areas
        env:
          CHANGED_FILES: ${{ steps.detect.outputs.changed_files }}
        run: |
          {
            echo "## Release scope"
            echo ""
            echo "- Android changed: \`${{ steps.detect.outputs.android_changed }}\`"
            echo "- AWS changed: \`${{ steps.detect.outputs.aws_changed }}\`"
            echo "- DB migrations changed: \`${{ steps.detect.outputs.db_migrations_changed }}\`"
            echo ""
            echo "### Changed files"
            echo ""
            if [[ -n "${CHANGED_FILES}" ]]; then
              printf '%s\n' "${CHANGED_FILES}"
            else
              echo "No changed files detected."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  wait_ci_for_aws_release:
    name: Wait for CI before AWS release
    needs: changes
    runs-on: ubuntu-24.04

    steps:
      - name: Wait for CI workflow to finish for this SHA
        env:
          GH_TOKEN: ${{ github.token }}
          AWS_CHANGED: ${{ needs.changes.outputs.aws_changed }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" != "push" ]] || [[ "${GITHUB_REF}" != "refs/heads/main" ]] || [[ "${AWS_CHANGED}" != "true" ]]; then
            echo "Skipping CI gate for this release run."
            exit 0
          fi

          deadline_epoch="$(( $(date +%s) + 3600 ))"

          while true; do
            runs_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?branch=main&event=push&head_sha=${GITHUB_SHA}&per_page=10")"
            run_count="$(jq '.workflow_runs | length' <<< "${runs_json}")"

            if [[ "${run_count}" -gt 0 ]]; then
              latest_run_json="$(jq '.workflow_runs | sort_by(.created_at) | last' <<< "${runs_json}")"
              status="$(jq -r '.status' <<< "${latest_run_json}")"
              conclusion="$(jq -r '.conclusion // "null"' <<< "${latest_run_json}")"
              run_url="$(jq -r '.html_url' <<< "${latest_run_json}")"

              if [[ "${status}" == "completed" ]]; then
                if [[ "${conclusion}" == "success" ]]; then
                  exit 0
                fi

                echo "CI workflow finished with conclusion ${conclusion}: ${run_url}" >&2
                exit 1
              fi
            fi

            if [[ "$(date +%s)" -ge "${deadline_epoch}" ]]; then
              echo "Timed out waiting for CI workflow for ${GITHUB_SHA}." >&2
              exit 1
            fi

            sleep 30
          done

  aws_deploy:
    name: Deploy AWS release
    needs:
      - changes
      - wait_ci_for_aws_release
    if: ${{ needs.changes.outputs.aws_changed == 'true' && needs.wait_ci_for_aws_release.result == 'success' }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            apps/auth/package-lock.json
            apps/backend/package-lock.json
            apps/web/package-lock.json
            infra/aws/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: |
          npm ci --prefix api
          npm ci --prefix apps/auth
          npm ci --prefix apps/backend
          npm ci --prefix apps/web
          npm ci --prefix infra/aws

      - name: Bundle OpenAPI spec
        run: npm run bundle --prefix api

      - name: CDK deploy
        working-directory: infra/aws
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          cat > cdk.context.local.json <<CTXEOF
          {
            "region": "${{ vars.AWS_REGION }}",
            "domainName": "${{ vars.CDK_DOMAIN_NAME }}",
            "apiCertificateArn": "${{ vars.CDK_API_CERTIFICATE_ARN }}",
            "authCertificateArn": "${{ vars.CDK_AUTH_CERTIFICATE_ARN }}",
            "webCertificateArnUsEast1": "${{ vars.CDK_WEB_CERTIFICATE_ARN_US_EAST_1 }}",
            "apexRedirectCertificateArnUsEast1": "${{ vars.CDK_APEX_REDIRECT_CERTIFICATE_ARN_US_EAST_1 }}",
            "resendApiKeySecretArn": "${{ vars.CDK_RESEND_API_KEY_SECRET_ARN }}",
            "resendSenderEmail": "${{ vars.CDK_RESEND_SENDER_EMAIL }}",
            "openAiApiKeySecretArn": "${{ vars.CDK_OPENAI_API_KEY_SECRET_ARN }}",
            "anthropicApiKeySecretArn": "${{ vars.CDK_ANTHROPIC_API_KEY_SECRET_ARN }}",
            "langfusePublicKeySecretArn": "${{ vars.CDK_LANGFUSE_PUBLIC_KEY_SECRET_ARN }}",
            "langfuseSecretKeySecretArn": "${{ vars.CDK_LANGFUSE_SECRET_KEY_SECRET_ARN }}",
            "langfuseBaseUrl": "${{ vars.CDK_LANGFUSE_BASE_URL }}",
            "demoEmailDostip": "${{ vars.CDK_DEMO_EMAIL_DOSTIP }}",
            "demoPasswordSecretArn": "${{ vars.CDK_DEMO_PASSWORD_SECRET_ARN }}",
            "guestAiWeightedMonthlyTokenCap": "${{ vars.CDK_GUEST_AI_WEIGHTED_MONTHLY_TOKEN_CAP }}",
            "githubOidcProviderArn": "arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com",
            "alertEmail": "${{ vars.CDK_ALERT_EMAIL }}",
            "githubRepo": "${{ vars.CDK_GITHUB_REPO }}"
          }
          CTXEOF
          npx cdk deploy --all --require-approval never

      - name: Check demo Cognito users
        run: bash scripts/check-demo-cognito-users.sh --stack-name ${{ env.STACK_NAME }} --region ${{ env.AWS_REGION }}

      - name: Run database migrations
        run: bash scripts/migrate-aws.sh --stack-name ${{ env.STACK_NAME }}

      - name: Check API health
        run: bash scripts/check-api-health.sh --stack-name ${{ env.STACK_NAME }}

      - name: Check public API routes
        run: bash scripts/check-public-endpoints.sh --stack-name ${{ env.STACK_NAME }}

      - name: Build web app
        run: npm run build --prefix apps/web

      - name: Deploy web assets
        run: bash scripts/deploy-web.sh --stack-name ${{ env.STACK_NAME }}

      - name: Check public custom domains
        run: bash scripts/check-public-endpoints.sh --stack-name ${{ env.STACK_NAME }}

      - name: Summarize deployed release
        run: |
          {
            echo "## AWS deploy"
            echo ""
            echo "- Deployed SHA: \`${GITHUB_SHA}\`"
            echo "- Web post-deploy smoke: pending next job"
          } >> "${GITHUB_STEP_SUMMARY}"

  web_smoke:
    name: Web post-deploy smoke
    needs:
      - changes
      - aws_deploy
    if: ${{ needs.changes.outputs.aws_changed == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci --prefix apps/web

      - name: Build web app for live smoke
        env:
          VITE_APP_BASE_URL: https://app.flashcards-open-source-app.com
          VITE_API_BASE_URL: https://api.flashcards-open-source-app.com/v1
          VITE_AUTH_BASE_URL: https://auth.flashcards-open-source-app.com
        run: npm run build --prefix apps/web

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run live web smoke test
        id: live_smoke
        working-directory: apps/web
        env:
          FLASHCARDS_E2E_APP_BASE_URL: https://app.flashcards-open-source-app.com
          FLASHCARDS_E2E_AUTH_BASE_URL: https://auth.flashcards-open-source-app.com
          FLASHCARDS_LIVE_REVIEW_EMAIL: google-review@example.com
        run: |
          set -euo pipefail

          cert_dir="${RUNNER_TEMP}/web-live-e2e-cert"
          cert_path="${cert_dir}/app.flashcards-open-source-app.com.crt"
          key_path="${cert_dir}/app.flashcards-open-source-app.com.key"
          server_log_path="${RUNNER_TEMP}/web-live-e2e-server.log"

          mkdir -p "${cert_dir}"

          openssl req \
            -x509 \
            -newkey rsa:2048 \
            -sha256 \
            -nodes \
            -days 1 \
            -subj "/CN=app.flashcards-open-source-app.com" \
            -addext "subjectAltName=DNS:app.flashcards-open-source-app.com" \
            -keyout "${key_path}" \
            -out "${cert_path}"

          printf '127.0.0.1 app.flashcards-open-source-app.com\n' | sudo tee -a /etc/hosts >/dev/null

          sudo env PATH="${PATH}" node scripts/serve-dist-https.mjs \
            --host 0.0.0.0 \
            --port 443 \
            --dir dist \
            --cert "${cert_path}" \
            --key "${key_path}" >"${server_log_path}" 2>&1 &
          server_pid=$!

          cleanup() {
            sudo kill "${server_pid}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl --silent --show-error --fail --insecure https://app.flashcards-open-source-app.com/ >/dev/null; then
              break
            fi
            sleep 1
          done

          curl --silent --show-error --fail --insecure https://app.flashcards-open-source-app.com/ >/dev/null
          npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-playwright-report
          if-no-files-found: ignore
          path: apps/web/playwright-report

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-playwright-test-results
          if-no-files-found: ignore
          path: apps/web/test-results

      - name: Summarize smoke result
        if: always()
        run: |
          {
            echo "## Web post-deploy smoke"
            echo ""
            echo "- Deployed SHA: \`${GITHUB_SHA}\`"
            echo "- Result: \`${{ steps.live_smoke.outcome }}\`"
            echo "- Artifacts: \`web-playwright-report\`, \`web-playwright-test-results\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  mark_aws_retained:
    name: Mark retained AWS release
    needs:
      - changes
      - aws_deploy
      - web_smoke
    if: ${{ needs.changes.outputs.aws_changed == 'true' && needs.aws_deploy.result == 'success' && needs.web_smoke.result == 'success' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Mark current SHA as retained AWS release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state='success' \
            -f context='AWS retained release' \
            -f description='retained after production deploy and web smoke' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

  rollback_aws:
    name: Roll back AWS release
    needs:
      - changes
      - aws_deploy
      - web_smoke
    if: ${{ always() && needs.changes.outputs.aws_changed == 'true' && needs.aws_deploy.result == 'success' && needs.web_smoke.result == 'failure' && needs.changes.outputs.db_migrations_changed != 'true' }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    outputs:
      rollback_target_sha: ${{ steps.resolve.outputs.rollback_target_sha }}

    steps:
      - name: Resolve previous retained AWS release SHA
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          commits_json="$(gh api "repos/${GITHUB_REPOSITORY}/commits?sha=main&per_page=50")"
          rollback_target_sha=""

          for candidate_sha in $(jq -r '.[].sha' <<< "${commits_json}"); do
            if [[ "${candidate_sha}" == "${GITHUB_SHA}" ]]; then
              continue
            fi

            status_json="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${candidate_sha}/status")"
            retained_state="$(jq -r '.statuses[] | select(.context == "AWS retained release" and .state == "success") | .state' <<< "${status_json}" | head -n 1)"

            if [[ "${retained_state}" == "success" ]]; then
              rollback_target_sha="${candidate_sha}"
              break
            fi
          done

          if [[ -z "${rollback_target_sha}" ]]; then
            echo "Could not find a previous retained AWS release SHA on main." >&2
            exit 1
          fi

          echo "rollback_target_sha=${rollback_target_sha}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve.outputs.rollback_target_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            apps/auth/package-lock.json
            apps/backend/package-lock.json
            apps/web/package-lock.json
            infra/aws/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: |
          npm ci --prefix api
          npm ci --prefix apps/auth
          npm ci --prefix apps/backend
          npm ci --prefix apps/web
          npm ci --prefix infra/aws

      - name: Bundle OpenAPI spec
        run: npm run bundle --prefix api

      - name: CDK deploy retained AWS release
        working-directory: infra/aws
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          cat > cdk.context.local.json <<CTXEOF
          {
            "region": "${{ vars.AWS_REGION }}",
            "domainName": "${{ vars.CDK_DOMAIN_NAME }}",
            "apiCertificateArn": "${{ vars.CDK_API_CERTIFICATE_ARN }}",
            "authCertificateArn": "${{ vars.CDK_AUTH_CERTIFICATE_ARN }}",
            "webCertificateArnUsEast1": "${{ vars.CDK_WEB_CERTIFICATE_ARN_US_EAST_1 }}",
            "apexRedirectCertificateArnUsEast1": "${{ vars.CDK_APEX_REDIRECT_CERTIFICATE_ARN_US_EAST_1 }}",
            "resendApiKeySecretArn": "${{ vars.CDK_RESEND_API_KEY_SECRET_ARN }}",
            "resendSenderEmail": "${{ vars.CDK_RESEND_SENDER_EMAIL }}",
            "openAiApiKeySecretArn": "${{ vars.CDK_OPENAI_API_KEY_SECRET_ARN }}",
            "anthropicApiKeySecretArn": "${{ vars.CDK_ANTHROPIC_API_KEY_SECRET_ARN }}",
            "langfusePublicKeySecretArn": "${{ vars.CDK_LANGFUSE_PUBLIC_KEY_SECRET_ARN }}",
            "langfuseSecretKeySecretArn": "${{ vars.CDK_LANGFUSE_SECRET_KEY_SECRET_ARN }}",
            "langfuseBaseUrl": "${{ vars.CDK_LANGFUSE_BASE_URL }}",
            "demoEmailDostip": "${{ vars.CDK_DEMO_EMAIL_DOSTIP }}",
            "demoPasswordSecretArn": "${{ vars.CDK_DEMO_PASSWORD_SECRET_ARN }}",
            "guestAiWeightedMonthlyTokenCap": "${{ vars.CDK_GUEST_AI_WEIGHTED_MONTHLY_TOKEN_CAP }}",
            "githubOidcProviderArn": "arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com",
            "alertEmail": "${{ vars.CDK_ALERT_EMAIL }}",
            "githubRepo": "${{ vars.CDK_GITHUB_REPO }}"
          }
          CTXEOF
          npx cdk deploy --all --require-approval never

      - name: Check demo Cognito users
        run: bash scripts/check-demo-cognito-users.sh --stack-name ${{ env.STACK_NAME }} --region ${{ env.AWS_REGION }}

      - name: Check API health
        run: bash scripts/check-api-health.sh --stack-name ${{ env.STACK_NAME }}

      - name: Check public API routes
        run: bash scripts/check-public-endpoints.sh --stack-name ${{ env.STACK_NAME }}

      - name: Build web app
        run: npm run build --prefix apps/web

      - name: Deploy web assets
        run: bash scripts/deploy-web.sh --stack-name ${{ env.STACK_NAME }}

      - name: Check public custom domains
        run: bash scripts/check-public-endpoints.sh --stack-name ${{ env.STACK_NAME }}

      - name: Summarize rollback
        run: |
          {
            echo "## AWS rollback"
            echo ""
            echo "- Failed SHA: \`${GITHUB_SHA}\`"
            echo "- Rolled back to retained SHA: \`${{ steps.resolve.outputs.rollback_target_sha }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  aws_release_status:
    name: Resolve AWS release outcome
    needs:
      - changes
      - wait_ci_for_aws_release
      - aws_deploy
      - web_smoke
      - mark_aws_retained
      - rollback_aws
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    outputs:
      aws_release_status: ${{ steps.resolve.outputs.aws_release_status }}
      rollback_performed: ${{ steps.resolve.outputs.rollback_performed }}
      retained_aws_sha: ${{ steps.resolve.outputs.retained_aws_sha }}

    steps:
      - name: Resolve AWS release status
        id: resolve
        run: |
          set -euo pipefail

          aws_release_status="no_aws_changes"
          rollback_performed="false"
          retained_aws_sha=""

          if [[ "${{ needs.changes.outputs.aws_changed }}" == "true" ]]; then
            if [[ "${{ needs.wait_ci_for_aws_release.result }}" != "success" ]]; then
              aws_release_status="ci_gate_failed"
            elif [[ "${{ needs.aws_deploy.result }}" != "success" ]]; then
              aws_release_status="deployment_failed"
            elif [[ "${{ needs.web_smoke.result }}" == "success" ]]; then
              aws_release_status="retained"
              retained_aws_sha="${GITHUB_SHA}"
            elif [[ "${{ needs.changes.outputs.db_migrations_changed }}" == "true" ]]; then
              aws_release_status="fix_forward_required"
            elif [[ "${{ needs.rollback_aws.result }}" == "success" ]]; then
              aws_release_status="reverted"
              rollback_performed="true"
              retained_aws_sha="${{ needs.rollback_aws.outputs.rollback_target_sha }}"
            else
              aws_release_status="rollback_failed"
            fi
          fi

          {
            echo "aws_release_status=${aws_release_status}"
            echo "rollback_performed=${rollback_performed}"
            echo "retained_aws_sha=${retained_aws_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Summarize AWS release outcome
        run: |
          {
            echo "## AWS release outcome"
            echo ""
            echo "- AWS release status: \`${{ steps.resolve.outputs.aws_release_status }}\`"
            echo "- Rollback performed: \`${{ steps.resolve.outputs.rollback_performed }}\`"
            echo "- Retained AWS SHA: \`${{ steps.resolve.outputs.retained_aws_sha || 'n/a' }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  dispatch_android_release:
    name: Dispatch Android release
    needs:
      - changes
      - aws_release_status
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.android_changed == 'true' && (needs.aws_release_status.outputs.aws_release_status == 'no_aws_changes' || needs.aws_release_status.outputs.aws_release_status == 'retained') }}
    runs-on: ubuntu-24.04

    steps:
      - name: Dispatch Android release workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/android-release.yml/dispatches" \
            -f ref='main' \
            -f inputs[target_sha]="${GITHUB_SHA}" \
            -f inputs[source_run_id]="${GITHUB_RUN_ID}" \
            -f inputs[source_run_url]="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Summarize Android dispatch
        run: |
          {
            echo "## Android release dispatch"
            echo ""
            echo "- Android changed: \`${{ needs.changes.outputs.android_changed }}\`"
            echo "- AWS release status: \`${{ needs.aws_release_status.outputs.aws_release_status }}\`"
            echo "- Dispatched Android release for SHA: \`${GITHUB_SHA}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  release_summary:
    name: Release summary
    if: ${{ always() }}
    needs:
      - changes
      - wait_ci_for_aws_release
      - aws_deploy
      - web_smoke
      - rollback_aws
      - aws_release_status
      - dispatch_android_release
    runs-on: ubuntu-24.04

    steps:
      - name: Summarize release outcome
        run: |
          {
            echo "## Main release orchestrator summary"
            echo ""
            echo "- Android changed: \`${{ needs.changes.outputs.android_changed }}\`"
            echo "- AWS changed: \`${{ needs.changes.outputs.aws_changed }}\`"
            echo "- DB migrations changed: \`${{ needs.changes.outputs.db_migrations_changed }}\`"
            echo "- CI gate job: \`${{ needs.wait_ci_for_aws_release.result }}\`"
            echo "- AWS release status: \`${{ needs.aws_release_status.outputs.aws_release_status }}\`"
            echo "- Rollback performed: \`${{ needs.aws_release_status.outputs.rollback_performed }}\`"
            echo "- Retained AWS SHA: \`${{ needs.aws_release_status.outputs.retained_aws_sha || 'n/a' }}\`"
            echo "- Android dispatch job: \`${{ needs.dispatch_android_release.result }}\`"
            echo "- AWS deploy job: \`${{ needs.aws_deploy.result }}\`"
            echo "- Web smoke job: \`${{ needs.web_smoke.result }}\`"
            echo "- Run details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Fail workflow when the retained release is not healthy
        run: |
          set -euo pipefail

          aws_release_status="${{ needs.aws_release_status.outputs.aws_release_status }}"

          if [[ "${aws_release_status}" != "no_aws_changes" ]] && [[ "${aws_release_status}" != "retained" ]]; then
            echo "AWS release finished in non-healthy state: ${aws_release_status}" >&2
            exit 1
          fi
