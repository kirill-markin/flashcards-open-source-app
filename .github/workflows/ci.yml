name: CI

on:
  pull_request:
    paths:
      - 'api/**'
      - 'apps/auth/**'
      - 'apps/backend/**'
      - 'apps/web/**'
      - 'db/**'
      - 'infra/**'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy.yml'
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'apps/auth/**'
      - 'apps/backend/**'
      - 'apps/web/**'
      - 'db/**'
      - 'infra/**'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-24.04

    outputs:
      api: ${{ steps.filter.outputs.api }}
      auth: ${{ steps.filter.outputs.auth }}
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
      infra: ${{ steps.filter.outputs.infra }}

    steps:
      - uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            api:
              - 'api/**'
              - '.github/workflows/ci.yml'
            auth:
              - 'apps/auth/**'
              - '.github/workflows/ci.yml'
            backend:
              - 'apps/backend/**'
              - '.github/workflows/ci.yml'
            web:
              - 'apps/web/**'
              - 'apps/backend/src/schedule.ts'
              - 'apps/backend/src/workspaceSchedulerConfig.ts'
              - '.github/workflows/ci.yml'
            infra:
              - 'infra/**'
              - '.github/workflows/ci.yml'

  api:
    name: API lint and bundle
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix api

      - name: Lint OpenAPI spec
        run: npm run lint --prefix api

      - name: Bundle OpenAPI spec
        run: npm run bundle --prefix api

  auth:
    name: Auth build
    needs: changes
    if: needs.changes.outputs.auth == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/auth/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix apps/auth

      - name: Build auth app
        run: npm run build --prefix apps/auth

  backend:
    name: Backend lint and build
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            apps/backend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix api
          npm ci --prefix apps/backend

      - name: Lint backend
        run: npm run lint --prefix apps/backend

      - name: Build backend
        run: npm run build --prefix apps/backend

  web:
    name: Web build
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix apps/web

      - name: Build web app
        run: npm run build --prefix apps/web

  web-live-e2e:
    name: Web live E2E
    needs: changes
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && (needs.changes.outputs.web == 'true' || needs.changes.outputs.auth == 'true' || needs.changes.outputs.backend == 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci --prefix apps/web

      - name: Build web app for live smoke
        env:
          VITE_APP_BASE_URL: https://app.flashcards-open-source-app.com
          VITE_API_BASE_URL: https://api.flashcards-open-source-app.com/v1
          VITE_AUTH_BASE_URL: https://auth.flashcards-open-source-app.com
        run: npm run build --prefix apps/web

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run live web smoke test
        working-directory: apps/web
        env:
          FLASHCARDS_E2E_APP_BASE_URL: https://app.flashcards-open-source-app.com
          FLASHCARDS_E2E_AUTH_BASE_URL: https://auth.flashcards-open-source-app.com
          FLASHCARDS_LIVE_REVIEW_EMAIL: google-review@example.com
        run: |
          set -euo pipefail

          cert_dir="${RUNNER_TEMP}/web-live-e2e-cert"
          cert_path="${cert_dir}/app.flashcards-open-source-app.com.crt"
          key_path="${cert_dir}/app.flashcards-open-source-app.com.key"
          server_log_path="${RUNNER_TEMP}/web-live-e2e-server.log"

          mkdir -p "${cert_dir}"

          openssl req \
            -x509 \
            -newkey rsa:2048 \
            -sha256 \
            -nodes \
            -days 1 \
            -subj "/CN=app.flashcards-open-source-app.com" \
            -addext "subjectAltName=DNS:app.flashcards-open-source-app.com" \
            -keyout "${key_path}" \
            -out "${cert_path}"

          printf '127.0.0.1 app.flashcards-open-source-app.com\n' | sudo tee -a /etc/hosts >/dev/null

          sudo env PATH="${PATH}" node scripts/serve-dist-https.mjs \
            --host 0.0.0.0 \
            --port 443 \
            --dir dist \
            --cert "${cert_path}" \
            --key "${key_path}" >"${server_log_path}" 2>&1 &
          server_pid=$!

          cleanup() {
            sudo kill "${server_pid}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl --silent --show-error --fail --insecure https://app.flashcards-open-source-app.com/ >/dev/null; then
              break
            fi
            sleep 1
          done

          curl --silent --show-error --fail --insecure https://app.flashcards-open-source-app.com/ >/dev/null
          npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-playwright-report
          if-no-files-found: ignore
          path: apps/web/playwright-report

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-playwright-test-results
          if-no-files-found: ignore
          path: apps/web/test-results

  infra:
    name: Infra build
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infra/aws/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix infra/aws

      - name: Build infra
        run: npm run build --prefix infra/aws
