name: CI

on:
  pull_request:
    paths:
      - 'api/**'
      - 'apps/auth/**'
      - 'apps/backend/**'
      - 'apps/web/**'
      - 'db/**'
      - 'infra/**'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy.yml'
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'apps/auth/**'
      - 'apps/backend/**'
      - 'apps/web/**'
      - 'db/**'
      - 'infra/**'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-24.04

    outputs:
      api: ${{ steps.filter.outputs.api }}
      auth: ${{ steps.filter.outputs.auth }}
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
      infra: ${{ steps.filter.outputs.infra }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'api/**'
              - '.github/workflows/ci.yml'
            auth:
              - 'apps/auth/**'
              - '.github/workflows/ci.yml'
            backend:
              - 'apps/backend/**'
              - '.github/workflows/ci.yml'
            web:
              - 'apps/web/**'
              - 'apps/backend/src/schedule.ts'
              - 'apps/backend/src/workspaceSchedulerConfig.ts'
              - '.github/workflows/ci.yml'
            infra:
              - 'infra/**'
              - '.github/workflows/ci.yml'

  api:
    name: API lint and bundle
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix api

      - name: Lint OpenAPI spec
        run: npm run lint --prefix api

      - name: Bundle OpenAPI spec
        run: npm run bundle --prefix api

  auth:
    name: Auth build
    needs: changes
    if: needs.changes.outputs.auth == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/auth/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix apps/auth

      - name: Build auth app
        run: npm run build --prefix apps/auth

  backend:
    name: Backend lint and build
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            apps/backend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix api
          npm ci --prefix apps/backend

      - name: Lint backend
        run: npm run lint --prefix apps/backend

      - name: Build backend
        run: npm run build --prefix apps/backend

  web:
    name: Web build
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix apps/web

      - name: Build web app
        run: npm run build --prefix apps/web

  infra:
    name: Infra build
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infra/aws/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix infra/aws

      - name: Build infra
        run: npm run build --prefix infra/aws
