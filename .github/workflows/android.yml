name: Android CI

on:
  pull_request:
    paths:
      - 'apps/android/**'
      - '!apps/android/README.md'
      - '!apps/android/docs/**'
      - 'scripts/run-android-ci.sh'
      - 'scripts/run-android-firebase-test-lab.sh'
      - 'scripts/run-android-release.sh'
      - 'scripts/setup-github-android.sh'
      - 'cloudbuild.android.yaml'
      - '.github/workflows/android-ci-reusable.yml'
      - '.github/workflows/android-release.yml'
      - '.github/workflows/android.yml'
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  android_ci:
    name: Android CI
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/android-ci-reusable.yml
    with:
      run_live_smoke: ${{ github.event_name == 'workflow_dispatch' }}
      target_ref: ${{ github.sha }}
    secrets: inherit
