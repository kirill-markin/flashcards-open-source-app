<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flashcards Play Store Feature Graphic</title>
    <style>
        :root {
            --ink: #101417;
            --mist: #f8f3ec;
            --sand: #d6c4b4;
            --accent: #c44b2d;
            --accent-soft: #df7659;
            --line: rgba(248, 243, 236, 0.12);
            --shadow: rgba(0, 0, 0, 0.28);
            --body-font: "Avenir Next", "Segoe UI", sans-serif;
            --headline-font: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
            --content-padding-y: 50px;
            --content-padding-x: 60px;
            --copy-max-width: 448px;
            --eyebrow-size: 14px;
            --eyebrow-letter-spacing: 0.18em;
            --eyebrow-transform: uppercase;
            --headline-size: 54px;
            --headline-line-height: 0.98;
            --headline-letter-spacing: -0.04em;
            --summary-size: 18px;
            --summary-line-height: 1.35;
            --chips-gap: 9px;
            --chips-margin-top: 22px;
            --chip-font-size: 13px;
            --chip-padding-y: 8px;
            --chip-padding-x: 13px;
            --badge-width: auto;
            --badge-title-size: 13px;
            --badge-letter-spacing: 0.08em;
            --badge-transform: uppercase;
            --badge-copy-size: 15px;
            --badge-copy-line-height: 1.25;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 1024px;
            height: 500px;
            overflow: hidden;
            background: var(--ink);
            color: var(--mist);
        }

        body {
            font-family: var(--body-font);
        }

        .canvas {
            position: relative;
            width: 1024px;
            height: 500px;
            overflow: hidden;
            background:
                radial-gradient(circle at top left, rgba(196, 75, 45, 0.18), transparent 34%),
                radial-gradient(circle at 84% 18%, rgba(223, 118, 89, 0.16), transparent 18%),
                radial-gradient(circle at 78% 72%, rgba(248, 243, 236, 0.08), transparent 20%),
                linear-gradient(135deg, #101417 0%, #141b21 44%, #0f1418 100%);
        }

        .canvas::before {
            content: "";
            position: absolute;
            inset: 28px;
            border: 1px solid var(--line);
            border-radius: 30px;
            pointer-events: none;
        }

        .canvas::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(transparent 96%, rgba(248, 243, 236, 0.04) 100%),
                linear-gradient(90deg, transparent 96%, rgba(248, 243, 236, 0.03) 100%);
            background-size: 100% 30px, 30px 100%;
            opacity: 0.18;
            mix-blend-mode: screen;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1.05fr 0.95fr;
            gap: 24px;
            width: 100%;
            height: 100%;
            padding: var(--content-padding-y) var(--content-padding-x);
        }

        .copy {
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: var(--copy-max-width);
        }

        .eyebrow {
            margin: 0 0 16px;
            color: var(--sand);
            font-size: var(--eyebrow-size);
            font-weight: 600;
            letter-spacing: var(--eyebrow-letter-spacing);
            text-transform: var(--eyebrow-transform);
        }

        h1 {
            margin: 0;
            color: var(--mist);
            font-family: var(--headline-font);
            font-size: var(--headline-size);
            line-height: var(--headline-line-height);
            font-weight: 700;
            letter-spacing: var(--headline-letter-spacing);
        }

        .accent {
            color: #f0b39f;
        }

        .summary {
            margin: 18px 0 0;
            color: rgba(248, 243, 236, 0.82);
            font-size: var(--summary-size);
            line-height: var(--summary-line-height);
            letter-spacing: -0.01em;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: var(--chips-gap);
            margin-top: var(--chips-margin-top);
        }

        .chip {
            padding: var(--chip-padding-y) var(--chip-padding-x);
            border: 1px solid rgba(248, 243, 236, 0.14);
            border-radius: 999px;
            background: rgba(248, 243, 236, 0.05);
            color: var(--mist);
            font-size: var(--chip-font-size);
            line-height: 1;
            white-space: nowrap;
            backdrop-filter: blur(6px);
        }

        .art {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orbit {
            position: absolute;
            inset: 72px 12px 72px 72px;
            border: 1px solid rgba(248, 243, 236, 0.09);
            border-radius: 36px;
            transform: rotate(-7deg);
        }

        .orbit::before,
        .orbit::after {
            content: "";
            position: absolute;
            border-radius: 999px;
            background: rgba(248, 243, 236, 0.08);
        }

        .orbit::before {
            top: -8px;
            left: 28px;
            width: 16px;
            height: 16px;
        }

        .orbit::after {
            right: 42px;
            bottom: -8px;
            width: 12px;
            height: 12px;
        }

        .hero-stack {
            position: relative;
            width: 330px;
            height: 290px;
        }

        .panel {
            position: absolute;
            border-radius: 34px;
            box-shadow: 0 30px 70px var(--shadow);
        }

        .panel.back {
            top: 46px;
            left: 128px;
            width: 176px;
            height: 228px;
            background: linear-gradient(180deg, var(--accent-soft) 0%, var(--accent) 100%);
            transform: rotate(8deg);
        }

        .panel.front {
            top: 18px;
            left: 40px;
            width: 192px;
            height: 248px;
            background: linear-gradient(180deg, #fffaf4 0%, var(--mist) 100%);
            transform: rotate(-6deg);
        }

        .panel.front::before,
        .panel.front::after {
            content: "";
            position: absolute;
            left: 28px;
            border-radius: 999px;
            background: rgba(16, 20, 23, 0.15);
        }

        .panel.front::before {
            top: 56px;
            width: 110px;
            height: 10px;
        }

        .panel.front::after {
            top: 82px;
            width: 82px;
            height: 10px;
        }

        .spark {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(248, 243, 236, 0.95), rgba(248, 243, 236, 0.1));
            filter: blur(0.2px);
        }

        .spark.one {
            top: 22px;
            right: 36px;
            width: 18px;
            height: 18px;
        }

        .spark.two {
            top: 54px;
            right: 2px;
            width: 8px;
            height: 8px;
        }

        .spark.three {
            bottom: 26px;
            left: 12px;
            width: 12px;
            height: 12px;
        }

        .badge {
            position: absolute;
            right: 18px;
            bottom: 8px;
            width: var(--badge-width);
            padding: 14px 16px 13px;
            border: 1px solid rgba(248, 243, 236, 0.12);
            border-radius: 18px;
            background: rgba(16, 20, 23, 0.76);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
            backdrop-filter: blur(10px);
        }

        .badge-title {
            margin: 0 0 5px;
            color: var(--mist);
            font-size: var(--badge-title-size);
            font-weight: 700;
            letter-spacing: var(--badge-letter-spacing);
            text-transform: var(--badge-transform);
        }

        .badge-copy {
            margin: 0;
            color: rgba(248, 243, 236, 0.76);
            font-size: var(--badge-copy-size);
            line-height: var(--badge-copy-line-height);
        }

        .rtl .content {
            grid-template-columns: 0.95fr 1.05fr;
        }

        .rtl .copy {
            text-align: right;
            margin-left: auto;
        }

        .rtl .chips {
            justify-content: flex-end;
        }

        .rtl .badge {
            left: 18px;
            right: auto;
            text-align: right;
        }
    </style>
</head>
<body>
    <main class="canvas">
        <section class="content">
            <div class="copy">
                <p class="eyebrow" id="eyebrow"></p>
                <h1 id="headline"></h1>
                <p class="summary" id="summary"></p>
                <div class="chips" id="chips" aria-label="Feature highlights"></div>
            </div>

            <div class="art" aria-hidden="true">
                <div class="orbit"></div>
                <div class="hero-stack">
                    <div class="panel back"></div>
                    <div class="panel front"></div>
                    <div class="spark one"></div>
                    <div class="spark two"></div>
                    <div class="spark three"></div>
                    <div class="badge">
                        <p class="badge-title" id="badge-title"></p>
                        <p class="badge-copy" id="badge-copy"></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

        const rootElement = document.documentElement;
        const canvasElement = document.querySelector(".canvas");
        const eyebrowElement = document.getElementById("eyebrow");
        const headlineElement = document.getElementById("headline");
        const summaryElement = document.getElementById("summary");
        const chipsElement = document.getElementById("chips");
        const badgeTitleElement = document.getElementById("badge-title");
        const badgeCopyElement = document.getElementById("badge-copy");

        const renderChips = (chips) => {
            chipsElement.innerHTML = "";

            chips.forEach((chip) => {
                const chipElement = document.createElement("span");
                chipElement.className = "chip";
                chipElement.textContent = chip;
                chipsElement.appendChild(chipElement);
            });
        };

        const applyLocale = (locale) => {
            const config = localeConfigs[locale];

            if (!config) {
                throw new Error(`Unsupported locale: ${locale}`);
            }

            rootElement.lang = locale;
            rootElement.dir = config.dir;
            document.title = `Flashcards Play Store Feature Graphic - ${locale}`;
            canvasElement.classList.toggle("rtl", config.dir === "rtl");

            Object.entries(config.style).forEach(([name, value]) => {
                rootElement.style.setProperty(name, value);
            });

            eyebrowElement.textContent = config.eyebrow;
            headlineElement.innerHTML = config.headlineHtml;
            summaryElement.textContent = config.summary;
            renderChips(config.chips);
            badgeTitleElement.textContent = config.badgeTitle;
            badgeCopyElement.innerHTML = config.badgeCopyLines.join("<br />");
            canvasElement.dataset.ready = "true";
        };

        const params = new URLSearchParams(window.location.search);
        const locale = params.get("locale") || "en-US";

        applyLocale(locale);

</html>
