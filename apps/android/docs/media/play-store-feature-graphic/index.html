<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flashcards Play Store Feature Graphic</title>
    <style>
        :root {
            --ink: #101417;
            --ink-soft: #182028;
            --mist: #f8f3ec;
            --sand: #d6c4b4;
            --accent: #c44b2d;
            --accent-soft: #df7659;
            --line: rgba(248, 243, 236, 0.12);
            --shadow: rgba(0, 0, 0, 0.28);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 1024px;
            height: 500px;
            overflow: hidden;
            background: var(--ink);
            color: var(--mist);
        }

        body {
            font-family: "Avenir Next", "Segoe UI", sans-serif;
        }

        .canvas {
            position: relative;
            width: 1024px;
            height: 500px;
            overflow: hidden;
            background:
                radial-gradient(circle at top left, rgba(196, 75, 45, 0.18), transparent 34%),
                radial-gradient(circle at 84% 18%, rgba(223, 118, 89, 0.16), transparent 18%),
                radial-gradient(circle at 78% 72%, rgba(248, 243, 236, 0.08), transparent 20%),
                linear-gradient(135deg, #101417 0%, #141b21 44%, #0f1418 100%);
        }

        .canvas::before {
            content: "";
            position: absolute;
            inset: 28px;
            border: 1px solid var(--line);
            border-radius: 30px;
            pointer-events: none;
        }

        .canvas::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(transparent 96%, rgba(248, 243, 236, 0.04) 100%),
                linear-gradient(90deg, transparent 96%, rgba(248, 243, 236, 0.03) 100%);
            background-size: 100% 30px, 30px 100%;
            opacity: 0.18;
            mix-blend-mode: screen;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1.05fr 0.95fr;
            gap: 24px;
            width: 100%;
            height: 100%;
            padding: 58px 60px;
        }

        .copy {
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: 440px;
        }

        .eyebrow {
            margin: 0 0 18px;
            color: var(--sand);
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            color: var(--mist);
            font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
            font-size: 60px;
            line-height: 0.98;
            font-weight: 700;
            letter-spacing: -0.04em;
        }

        .accent {
            color: #f0b39f;
        }

        .summary {
            margin: 22px 0 0;
            color: rgba(248, 243, 236, 0.82);
            font-size: 21px;
            line-height: 1.35;
            letter-spacing: -0.01em;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 28px;
        }

        .chip {
            padding: 9px 14px;
            border: 1px solid rgba(248, 243, 236, 0.14);
            border-radius: 999px;
            background: rgba(248, 243, 236, 0.05);
            color: var(--mist);
            font-size: 14px;
            line-height: 1;
            white-space: nowrap;
            backdrop-filter: blur(6px);
        }

        .art {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orbit {
            position: absolute;
            inset: 72px 12px 72px 72px;
            border: 1px solid rgba(248, 243, 236, 0.09);
            border-radius: 36px;
            transform: rotate(-7deg);
        }

        .orbit::before,
        .orbit::after {
            content: "";
            position: absolute;
            border-radius: 999px;
            background: rgba(248, 243, 236, 0.08);
        }

        .orbit::before {
            top: -8px;
            left: 28px;
            width: 16px;
            height: 16px;
        }

        .orbit::after {
            right: 42px;
            bottom: -8px;
            width: 12px;
            height: 12px;
        }

        .hero-stack {
            position: relative;
            width: 330px;
            height: 290px;
        }

        .panel {
            position: absolute;
            border-radius: 34px;
            box-shadow: 0 30px 70px var(--shadow);
        }

        .panel.back {
            top: 46px;
            left: 128px;
            width: 176px;
            height: 228px;
            background: linear-gradient(180deg, var(--accent-soft) 0%, var(--accent) 100%);
            transform: rotate(8deg);
        }

        .panel.front {
            top: 18px;
            left: 40px;
            width: 192px;
            height: 248px;
            background: linear-gradient(180deg, #fffaf4 0%, var(--mist) 100%);
            transform: rotate(-6deg);
        }

        .panel.front::before,
        .panel.front::after {
            content: "";
            position: absolute;
            left: 28px;
            border-radius: 999px;
            background: rgba(16, 20, 23, 0.15);
        }

        .panel.front::before {
            top: 56px;
            width: 110px;
            height: 10px;
        }

        .panel.front::after {
            top: 82px;
            width: 82px;
            height: 10px;
        }

        .spark {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(248, 243, 236, 0.95), rgba(248, 243, 236, 0.1));
            filter: blur(0.2px);
        }

        .spark.one {
            top: 22px;
            right: 36px;
            width: 18px;
            height: 18px;
        }

        .spark.two {
            top: 54px;
            right: 2px;
            width: 8px;
            height: 8px;
        }

        .spark.three {
            bottom: 26px;
            left: 12px;
            width: 12px;
            height: 12px;
        }

        .badge {
            position: absolute;
            right: 18px;
            bottom: 8px;
            padding: 14px 16px 13px;
            border: 1px solid rgba(248, 243, 236, 0.12);
            border-radius: 18px;
            background: rgba(16, 20, 23, 0.76);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
            backdrop-filter: blur(10px);
        }

        .badge-title {
            margin: 0 0 5px;
            color: var(--mist);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .badge-copy {
            margin: 0;
            color: rgba(248, 243, 236, 0.76);
            font-size: 15px;
            line-height: 1.25;
        }
    </style>
</head>
<body>
    <main class="canvas">
        <section class="content">
            <div class="copy">
                <p class="eyebrow">Flashcards for Android</p>
                <h1>Study <span class="accent">offline</span><br />with calm focus</h1>
                <p class="summary">
                    Spaced repetition, AI help, and sync when you need it.
                </p>
                <div class="chips" aria-label="Feature highlights">
                    <span class="chip">Review</span>
                    <span class="chip">Decks</span>
                    <span class="chip">Tags</span>
                    <span class="chip">AI</span>
                    <span class="chip">Sync</span>
                </div>
            </div>

            <div class="art" aria-hidden="true">
                <div class="orbit"></div>
                <div class="hero-stack">
                    <div class="panel back"></div>
                    <div class="panel front"></div>
                    <div class="spark one"></div>
                    <div class="spark two"></div>
                    <div class="spark three"></div>
                    <div class="badge">
                        <p class="badge-title">Built for study</p>
                        <p class="badge-copy">Fast review, local-first,<br />clean Android UI</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
