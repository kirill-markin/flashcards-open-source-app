version = 1
name = "flashcards-open-source-app"

[setup]
script = '''
set -eu

SOURCE_ENV="$CODEX_SOURCE_TREE_PATH/.env"
WORKTREE_ENV="$CODEX_WORKTREE_PATH/.env"

if [ ! -f "$SOURCE_ENV" ]; then
  echo "Missing source .env: $SOURCE_ENV" >&2
  exit 1
fi

ln -sfn "$SOURCE_ENV" "$WORKTREE_ENV"

cd "$CODEX_WORKTREE_PATH"

UPSTREAM="$(git rev-parse --abbrev-ref --symbolic-full-name '@{u}' 2>/dev/null || true)"

if [ -n "$UPSTREAM" ]; then
  git fetch
  git merge --ff-only "$UPSTREAM"
fi

sh apps/ios/Flashcards/ci_scripts/ci_post_clone.sh

'''
