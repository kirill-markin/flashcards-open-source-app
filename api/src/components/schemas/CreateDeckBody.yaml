type: object
additionalProperties: false
required:
  - name
properties:
  name:
    type: string
  effortLevels:
    type: array
    items:
      $ref: ./EffortLevel.yaml
    description: Optional deck effort filter. Omit for no effort filter.
  tags:
    type: array
    items:
      type: string
    description: Optional deck tag filter. Omit for no tag filter.
