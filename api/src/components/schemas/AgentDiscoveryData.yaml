type: object
additionalProperties: false
required:
  - service
  - authentication
  - capabilitiesAfterLogin
  - authBaseUrl
  - apiBaseUrl
  - surface
properties:
  service:
    type: object
    additionalProperties: false
    required:
      - name
      - version
      - description
    properties:
      name:
        type: string
      version:
        type: string
        enum:
          - v1
      description:
        type: string
  authentication:
    type: object
    additionalProperties: false
    required:
      - type
      - sendCodeUrl
      - verifyCodeUrl
    properties:
      type:
        type: string
        enum:
          - email_otp_then_api_key
      sendCodeUrl:
        type: string
      verifyCodeUrl:
        type: string
  capabilitiesAfterLogin:
    type: array
    items:
      type: string
  authBaseUrl:
    type: string
  apiBaseUrl:
    type: string
  surface:
    type: object
    additionalProperties: false
    required:
      - accountUrl
      - workspacesUrl
      - sqlUrl
    properties:
      accountUrl:
        type: string
      workspacesUrl:
        type: string
      sqlUrl:
        type: string
