type: object
additionalProperties: false
required:
  - ok
  - data
  - instructions
  - docs
properties:
  ok:
    type: boolean
    enum:
      - true
  data:
    type: object
    additionalProperties: false
    required:
      - statementType
      - resource
      - sql
      - normalizedSql
    properties:
      statementType:
        type: string
        enum:
          - show_tables
          - describe
          - select
          - insert
          - update
          - delete
          - batch
      resource:
        anyOf:
          - type: string
          - type: 'null'
      sql:
        type: string
      normalizedSql:
        type: string
      rows:
        type: array
        items:
          type: object
      rowCount:
        type: integer
      limit:
        anyOf:
          - type: integer
          - type: 'null'
      offset:
        anyOf:
          - type: integer
          - type: 'null'
      hasMore:
        type: boolean
      affectedCount:
        type: integer
      statements:
        type: array
        items:
          type: object
      statementCount:
        type: integer
      affectedCountTotal:
        anyOf:
          - type: integer
          - type: 'null'
  instructions:
    type: string
  docs:
    $ref: ./AgentDocs.yaml
