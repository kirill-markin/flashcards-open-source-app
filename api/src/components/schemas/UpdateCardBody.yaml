type: object
additionalProperties: false
required:
  - cardId
properties:
  cardId:
    $ref: ./UuidString.yaml
  frontText:
    type:
      - string
      - 'null'
    description: >-
      Updated front side text. When not null, must be a question-only recall
      prompt and must not include the answer. Use null to keep unchanged.
  backText:
    type:
      - string
      - 'null'
    description: >-
      Updated back side text. When not null, must contain the answer and may
      include a concrete example (prefer fenced markdown code block when
      helpful). Use null to keep unchanged.
  tags:
    type:
      - array
      - 'null'
    items:
      type: string
    description: Optional tags update. Omit or use null to keep unchanged.
  effortLevel:
    type:
      - string
      - 'null'
    enum:
      - fast
      - medium
      - long
      - null
    description: Optional effort update. Omit or use null to keep unchanged.
