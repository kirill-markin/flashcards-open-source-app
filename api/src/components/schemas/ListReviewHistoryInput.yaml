type: object
additionalProperties: false
required:
  - cursor
  - limit
  - cardId
properties:
  cursor:
    anyOf:
      - $ref: ./OpaqueCursor.yaml
      - type: 'null'
    description: Opaque cursor from the previous page. Start with null.
  limit:
    $ref: ./PageLimit.yaml
  cardId:
    anyOf:
      - $ref: ./UuidString.yaml
      - type: 'null'
