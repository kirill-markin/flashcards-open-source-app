type: object
additionalProperties: false
required:
  - deckId
properties:
  deckId:
    $ref: ./UuidString.yaml
  name:
    type:
      - string
      - 'null'
  effortLevels:
    type:
      - array
      - 'null'
    items:
      $ref: ./EffortLevel.yaml
    description: Optional deck effort filter update. Omit or use null to keep unchanged.
  tags:
    type:
      - array
      - 'null'
    items:
      type: string
    description: Optional deck tag filter update. Omit or use null to keep unchanged.
