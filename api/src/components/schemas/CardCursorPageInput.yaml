type: object
additionalProperties: false
required:
  - cursor
  - limit
properties:
  cursor:
    anyOf:
      - $ref: ./OpaqueCursor.yaml
      - type: 'null'
    description: Opaque cursor from the previous page. Start with null.
  limit:
    $ref: ./PageLimit.yaml
  filter:
    anyOf:
      - $ref: ./CardFilter.yaml
      - type: 'null'
    description: Optional card filter. Omit or set null for no filter.
