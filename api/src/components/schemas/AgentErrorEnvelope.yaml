type: object
additionalProperties: false
required:
  - ok
  - data
  - instructions
  - docs
  - error
properties:
  ok:
    type: boolean
    enum:
      - false
  data:
    type: object
    additionalProperties: false
  instructions:
    type: string
  docs:
    $ref: ./AgentDocs.yaml
  error:
    type: object
    additionalProperties: false
    required:
      - code
      - message
    properties:
      code:
        type: string
      message:
        type: string
      details:
        $ref: ./AgentErrorDetails.yaml
  requestId:
    type: string
