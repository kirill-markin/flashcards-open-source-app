get:
  tags:
    - discovery
  summary: Agent discovery
  description: >-
    Discovery envelope for external AI agents. Includes auth bootstrap
    guidance, explicit workspace-selection flow instructions, and a link to
    the public agent-only OpenAPI document.
  responses:
    '200':
      description: Agent discovery envelope
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentDiscoveryEnvelope.yaml
          example:
            ok: true
            data:
              service:
                name: flashcards-open-source-app
                version: v1
                description: Offline-first flashcards service with user-owned workspaces and a compact SQL agent surface.
              authentication:
                type: email_otp_then_api_key
                sendCodeUrl: https://auth.flashcards-open-source-app.com/api/agent/send-code
                verifyCodeUrl: https://auth.flashcards-open-source-app.com/api/agent/verify-code
              capabilitiesAfterLogin:
                - Load account context
                - Select a workspace
                - Inspect the published SQL surface through OpenAPI and SQL introspection
                - Read and write cards and decks through /agent/sql
              authBaseUrl: https://auth.flashcards-open-source-app.com
              apiBaseUrl: https://api.flashcards-open-source-app.com/v1
              surface:
                accountUrl: https://api.flashcards-open-source-app.com/v1/agent/me
                workspacesUrl: https://api.flashcards-open-source-app.com/v1/agent/workspaces
                sqlUrl: https://api.flashcards-open-source-app.com/v1/agent/sql
            instructions: >-
              Start with POST
              https://auth.flashcards-open-source-app.com/api/agent/send-code
              using the user's email, then POST
              https://auth.flashcards-open-source-app.com/api/agent/verify-code
              with the otpSessionToken, code, and label to obtain an API key.
              After login, call GET
              https://api.flashcards-open-source-app.com/v1/agent/me, then GET
              https://api.flashcards-open-source-app.com/v1/agent/workspaces?limit=100.
              If no workspace is selected for this API key, call POST
              https://api.flashcards-open-source-app.com/v1/agent/workspaces/{workspaceId}/select
              or create one with POST
              https://api.flashcards-open-source-app.com/v1/agent/workspaces
              using {"name":"Personal"}. After workspace bootstrap, use POST
              https://api.flashcards-open-source-app.com/v1/agent/sql for all
              shared card and deck reads and writes. For routine low-risk
              writes, a clear user request already counts as permission. Ask
              again only for risky or unclear actions. SELECT returns at most
              100 rows per statement, and INSERT, UPDATE, and DELETE may affect
              at most 100 rows per statement. If you need more than 100
              writes, split the work into multiple batches of at most 100
              records across separate SQL statements or separate tool calls.
              Use
              https://api.flashcards-open-source-app.com/v1/agent/openapi.json
              for the full contract. The SQL surface is intentionally limited
              and is not full PostgreSQL.
            docs:
              openapiUrl: https://api.flashcards-open-source-app.com/v1/agent/openapi.json
