post:
  tags:
    - tools
  summary: Get workspace context
  description: Loads the selected workspace summary, deck summary, and scheduler settings.
  security:
    - ApiKeyHeader: []
  responses:
    '200':
      description: Workspace context envelope
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentWorkspaceContextEnvelope.yaml
          example:
            ok: true
            data:
              workspace:
                workspaceId: 50b5b928-7f04-4cc8-878d-6cd0e8b98474
                name: Kirill Flashcards
                createdAt: '2026-03-11T08:50:55.898Z'
                isSelected: true
              deckSummary:
                totalCards: 1676
                dueCards: 312
                newCards: 910
                reviewedCards: 766
                totalReps: 2431
                totalLapses: 121
              schedulerSettings:
                algorithm: fsrs-6
                desiredRetention: 0.9
                learningStepsMinutes:
                  - 1
                  - 10
                relearningStepsMinutes:
                  - 10
                maximumIntervalDays: 36500
                enableFuzz: true
                clientUpdatedAt: '2026-03-11T08:50:55.898Z'
                lastModifiedByDeviceId: 58d59a91-3210-4581-ac3a-0f850f0ced6f
                lastOperationId: workspace-settings-op-1
                updatedAt: '2026-03-11T08:50:55.898Z'
            actions:
              - name: list_tools
                method: GET
                url: https://api.flashcards-open-source-app.com/v1/agent/tools
                auth:
                  scheme: ApiKey
              - name: list_tags
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/list_tags
                auth:
                  scheme: ApiKey
              - name: list_cards
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/list_cards
                auth:
                  scheme: ApiKey
              - name: list_decks
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/list_decks
                auth:
                  scheme: ApiKey
              - name: create_cards
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/create_cards
                auth:
                  scheme: ApiKey
            instructions: >-
              Read payload from data.* (data.workspace, data.deckSummary,
              data.schedulerSettings). Do not expect context fields at the top
              level. Select the next endpoint from instructions and confirm it
              with actions.
            docs:
              openapiUrl: https://api.flashcards-open-source-app.com/v1/agent/openapi.json
              swaggerUrl: https://api.flashcards-open-source-app.com/v1/agent/swagger.json
    default:
      description: Agent error envelope
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentErrorEnvelope.yaml
