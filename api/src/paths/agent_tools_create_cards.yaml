post:
  tags:
    - tools
  summary: Create cards
  description: >-
    Creates one or more cards in the selected workspace. Enforce the flashcard
    side contract: frontText is a question-only recall prompt (no answer), and
    backText contains the answer with an optional concrete example (prefer
    fenced markdown code block when helpful). Sync metadata is generated
    server-side and is intentionally hidden from the external API.
  security:
    - ApiKeyHeader: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CreateCardsInput.yaml
  responses:
    '200':
      description: Cards created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentCreateCardsEnvelope.yaml
          example:
            ok: true
            data:
              cards:
                - cardId: be8d7f9f-4df4-472b-a1ca-c9cd5a8bc5c8
                  frontText: What is eventual consistency?
                  backText: >-
                    A model where replicas converge to the same value over time
                    without requiring immediate global consistency.
                  tags:
                    - distributed-systems
                  effortLevel: fast
                  dueAt: '2026-03-11T09:00:00.000Z'
                  reps: 3
                  lapses: 0
                  fsrsCardState: review
                  fsrsStepIndex: null
                  fsrsStability: 12.34
                  fsrsDifficulty: 4.56
                  fsrsLastReviewedAt: '2026-03-10T09:00:00.000Z'
                  fsrsScheduledDays: 4
                  clientUpdatedAt: '2026-03-10T09:00:00.000Z'
                  lastModifiedByDeviceId: 58d59a91-3210-4581-ac3a-0f850f0ced6f
                  lastOperationId: agent-op-1
                  updatedAt: '2026-03-10T09:00:00.000Z'
                  deletedAt: null
              createdCount: 1
            actions:
              - name: list_tools
                method: GET
                url: https://api.flashcards-open-source-app.com/v1/agent/tools
                auth:
                  scheme: ApiKey
              - name: create_cards
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/create_cards
                auth:
                  scheme: ApiKey
              - name: list_cards
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/list_cards
                auth:
                  scheme: ApiKey
              - name: update_cards
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/update_cards
                auth:
                  scheme: ApiKey
            instructions: >-
              Read payload from data.* (data.cards, data.createdCount). Do not
              expect mutation results at the top level. Select the next endpoint
              from instructions and confirm it with actions.
            docs:
              openapiUrl: https://api.flashcards-open-source-app.com/v1/agent/openapi.json
              swaggerUrl: https://api.flashcards-open-source-app.com/v1/agent/swagger.json
    default:
      description: Agent error envelope
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentErrorEnvelope.yaml
