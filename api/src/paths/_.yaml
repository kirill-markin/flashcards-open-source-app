get:
  tags:
    - discovery
  summary: Discovery alias
  description: >-
    Primary discovery entrypoint. Returns the same compact envelope as GET
    /agent.
  responses:
    '200':
      description: Agent discovery envelope
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentDiscoveryEnvelope.yaml
          example:
            ok: true
            data:
              service:
                name: flashcards-open-source-app
                version: v1
                description: >-
                  Offline-first flashcards service with user-owned workspaces
                  and AI-friendly API onboarding.
              authentication:
                type: email_otp_then_api_key
                registerAndLogin: >-
                  Ask which email the user wants to use, then start the same
                  flow for both new and existing users.
              capabilitiesAfterLogin:
                - Load account context
                - Select a workspace
                - Read and write cards and decks
              authBaseUrl: https://auth.flashcards-open-source-app.com
              apiBaseUrl: https://api.flashcards-open-source-app.com/v1
              docs:
                openapiUrl: >-
                  https://api.flashcards-open-source-app.com/v1/agent/openapi.json
                swaggerUrl: >-
                  https://api.flashcards-open-source-app.com/v1/agent/swagger.json
            actions:
              - name: send_code
                method: POST
                url: >-
                  https://auth.flashcards-open-source-app.com/api/agent/send-code
                input:
                  required:
                    - email
              - name: openapi
                method: GET
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/openapi.json
            instructions: >-
              Start with send_code. After login, call
              https://api.flashcards-open-source-app.com/v1/agent/me, then
              https://api.flashcards-open-source-app.com/v1/agent/workspaces?limit=100.
              A first workspace is auto-provisioned for new users. For paginated
              responses, pass data.nextCursor back unchanged as the cursor query
              parameter or JSON field and stop when data.nextCursor is null.
              Read payload from data.* (for example, data.workspaces). Do not
              expect resource fields at the top level. Select the next endpoint
              from instructions and confirm it with actions.
            docs:
              openapiUrl: https://api.flashcards-open-source-app.com/v1/agent/openapi.json
              swaggerUrl: https://api.flashcards-open-source-app.com/v1/agent/swagger.json
