get:
  tags:
    - bootstrap
  summary: List workspaces for the external agent
  description: >-
    Lists the user's workspaces in an agent-oriented envelope and points the
    caller to either create a workspace, select one for the current API key
    connection, or continue to SQL.
  parameters:
    - name: limit
      in: query
      required: true
      schema:
        $ref: ../components/schemas/PageLimit.yaml
      description: Explicit page size. Start with 100.
    - name: cursor
      in: query
      required: false
      schema:
        anyOf:
          - $ref: ../components/schemas/OpaqueCursor.yaml
          - type: 'null'
      description: >-
        Opaque cursor from the previous page. Start with null or omit it on the
        first request.
  security:
    - ApiKeyHeader: []
  responses:
    '200':
      description: Agent workspaces envelope
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentWorkspacesEnvelope.yaml
          example:
            ok: true
            data:
              workspaces:
                - workspaceId: 50b5b928-7f04-4cc8-878d-6cd0e8b98474
                  name: Kirill Flashcards
                  createdAt: '2026-03-11T08:50:55.898Z'
                  isSelected: true
              nextCursor: null
            instructions: >-
              Workspace bootstrap is complete. Use POST /v1/agent/sql for
              reads, writes, and SQL introspection. For example, query cards
              with SELECT * FROM cards ORDER BY updated_at DESC LIMIT 20 OFFSET
              0. For routine low-risk writes, a clear user request already
              counts as permission. Ask again only for risky or unclear
              actions. Read payload from data.* and use docs.openapiUrl for the
              full contract.
            docs:
              openapiUrl: https://api.flashcards-open-source-app.com/v1/agent/openapi.json
    default:
      description: Agent error envelope
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentErrorEnvelope.yaml
post:
  tags:
    - bootstrap
  summary: Create workspace for the external agent
  description: >-
    Creates a workspace and immediately marks it as selected for the current API
    key connection, then returns the ready-state agent envelope.
  security:
    - ApiKeyHeader: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CreateWorkspaceInput.yaml
  responses:
    '201':
      description: Workspace created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentWorkspaceEnvelope.yaml
          example:
            ok: true
            data:
              workspace:
                workspaceId: 50b5b928-7f04-4cc8-878d-6cd0e8b98474
                name: Kirill Flashcards
                createdAt: '2026-03-11T08:50:55.898Z'
                isSelected: true
            instructions: >-
              Workspace bootstrap is complete. Use POST /v1/agent/sql for
              reads, writes, and SQL introspection. Start discovery with SHOW
              TABLES or DESCRIBE cards when helpful. For routine low-risk
              writes, a clear user request already counts as permission. Ask
              again only for risky or unclear actions. This endpoint accepts
              the published SQL dialect, not full PostgreSQL. Read payload from
              data.* and use docs.openapiUrl for the full contract.
            docs:
              openapiUrl: https://api.flashcards-open-source-app.com/v1/agent/openapi.json
    default:
      description: Agent error envelope
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentErrorEnvelope.yaml
