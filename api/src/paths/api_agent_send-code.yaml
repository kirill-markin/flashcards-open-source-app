post:
  tags:
    - auth
  summary: Send OTP code
  description: >-
    Starts the external AI-agent auth flow by emailing an 8-digit OTP code and
    returning a short opaque otpSessionToken.
  servers:
    - url: https://auth.flashcards-open-source-app.com
      description: Auth host for email OTP bootstrap
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/AgentSendCodeInput.yaml
  responses:
    '200':
      description: OTP challenge created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentSendCodeEnvelope.yaml
          example:
            ok: true
            data:
              email: user@example.com
              otpSessionToken: ABCD-EFGH-IJKL-MNPQ-1234
              expiresInSeconds: 180
              authBaseUrl: https://auth.flashcards-open-source-app.com
              apiBaseUrl: https://api.flashcards-open-source-app.com/v1
            instructions: >-
              A verification code has been sent. Next call POST
              /api/agent/verify-code with the email, otpSessionToken, code, and
              connection label. Read payload from data.* and use
              docs.openapiUrl for the full contract.
            docs:
              openapiUrl: https://api.flashcards-open-source-app.com/v1/agent/openapi.json
