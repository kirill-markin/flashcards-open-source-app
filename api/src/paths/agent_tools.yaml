get:
  tags:
    - tools
  summary: List available external agent tools
  description: >-
    Returns a compact tool catalog for the workspace selected on the current API
    key connection. Use this route for lightweight discovery instead of relying
    on internal endpoint families.
  security:
    - ApiKeyHeader: []
  responses:
    '200':
      description: Agent tool catalog envelope
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentToolsEnvelope.yaml
          example:
            ok: true
            data:
              selectedWorkspaceId: 50b5b928-7f04-4cc8-878d-6cd0e8b98474
              tools:
                - name: list_cards
                  method: POST
                  url: >-
                    https://api.flashcards-open-source-app.com/v1/agent/tools/list_cards
                  description: List cards from the selected workspace.
            actions:
              - name: list_tools
                method: GET
                url: https://api.flashcards-open-source-app.com/v1/agent/tools
                auth:
                  scheme: ApiKey
              - name: get_workspace_context
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/get_workspace_context
                auth:
                  scheme: ApiKey
              - name: list_tags
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/list_tags
                auth:
                  scheme: ApiKey
              - name: search_cards
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/search_cards
                auth:
                  scheme: ApiKey
              - name: create_cards
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/create_cards
                auth:
                  scheme: ApiKey
            instructions: >-
              Read payload from data.* (data.tools, data.selectedWorkspaceId).
              Do not expect tool catalog fields at the top level. Select the
              next endpoint from instructions and confirm it with actions.
            docs:
              openapiUrl: https://api.flashcards-open-source-app.com/v1/agent/openapi.json
              swaggerUrl: https://api.flashcards-open-source-app.com/v1/agent/swagger.json
    default:
      description: Agent error envelope
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentErrorEnvelope.yaml
