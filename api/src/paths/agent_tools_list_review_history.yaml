post:
  tags:
    - tools
  summary: List review history
  description: >-
    Lists recent review events from the selected workspace, optionally filtered
    by cardId.
  security:
    - ApiKeyHeader: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ListReviewHistoryInput.yaml
  responses:
    '200':
      description: Review history listed
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentListReviewHistoryEnvelope.yaml
          example:
            ok: true
            data:
              history:
                - reviewEventId: 1f5f2d7b-0a4e-4012-a42c-8b6495a0c871
                  workspaceId: 50b5b928-7f04-4cc8-878d-6cd0e8b98474
                  cardId: be8d7f9f-4df4-472b-a1ca-c9cd5a8bc5c8
                  deviceId: 58d59a91-3210-4581-ac3a-0f850f0ced6f
                  clientEventId: client-review-1
                  rating: 3
                  reviewedAtClient: '2026-03-10T09:00:00.000Z'
                  reviewedAtServer: '2026-03-10T09:00:01.000Z'
              nextCursor: null
            actions:
              - name: list_tools
                method: GET
                url: https://api.flashcards-open-source-app.com/v1/agent/tools
                auth:
                  scheme: ApiKey
              - name: list_review_history
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/list_review_history
                auth:
                  scheme: ApiKey
              - name: get_cards
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/get_cards
                auth:
                  scheme: ApiKey
              - name: search_cards
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/search_cards
                auth:
                  scheme: ApiKey
            instructions: >-
              Read payload from data.* (data.history, data.nextCursor). Do not
              expect history at the top level. For paginated responses, pass
              data.nextCursor back unchanged as the cursor query parameter or
              JSON field and stop when data.nextCursor is null. Select the next
              endpoint from instructions and confirm it with actions.
            docs:
              openapiUrl: https://api.flashcards-open-source-app.com/v1/agent/openapi.json
              swaggerUrl: https://api.flashcards-open-source-app.com/v1/agent/swagger.json
    default:
      description: Agent error envelope
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentErrorEnvelope.yaml
