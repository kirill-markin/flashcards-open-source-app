post:
  tags:
    - tools
  summary: Delete decks
  description: >-
    Deletes one or more decks from the selected workspace. Sync metadata is
    generated server-side and is intentionally hidden from the external API.
  security:
    - ApiKeyHeader: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/DeleteDecksInput.yaml
  responses:
    '200':
      description: Decks deleted
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentDeleteDecksEnvelope.yaml
          example:
            ok: true
            data:
              deletedDeckIds:
                - db4e9fa3-6e56-4355-a35d-58bb0ef6f0e9
              deletedCount: 1
            actions:
              - name: list_tools
                method: GET
                url: https://api.flashcards-open-source-app.com/v1/agent/tools
                auth:
                  scheme: ApiKey
              - name: delete_decks
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/delete_decks
                auth:
                  scheme: ApiKey
              - name: list_decks
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/list_decks
                auth:
                  scheme: ApiKey
              - name: create_decks
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/create_decks
                auth:
                  scheme: ApiKey
            instructions: >-
              Read payload from data.* (data.deletedDeckIds, data.deletedCount).
              Do not expect deletion results at the top level. Select the next
              endpoint from instructions and confirm it with actions.
            docs:
              openapiUrl: https://api.flashcards-open-source-app.com/v1/agent/openapi.json
              swaggerUrl: https://api.flashcards-open-source-app.com/v1/agent/swagger.json
    default:
      description: Agent error envelope
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentErrorEnvelope.yaml
