post:
  tags:
    - tools
  summary: List tags
  description: >-
    Lists all selected-workspace tags with per-tag card counts and the total
    active card count. Tag counts can overlap because one card may have multiple
    tags.
  security:
    - ApiKeyHeader: []
  responses:
    '200':
      description: Workspace tags listed
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentListTagsEnvelope.yaml
          example:
            ok: true
            data:
              tags:
                - tag: grammar
                  cardsCount: 128
                - tag: verbs
                  cardsCount: 74
                - tag: spanish
                  cardsCount: 61
              totalCards: 143
            actions:
              - name: list_tools
                method: GET
                url: https://api.flashcards-open-source-app.com/v1/agent/tools
                auth:
                  scheme: ApiKey
              - name: get_workspace_context
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/get_workspace_context
                auth:
                  scheme: ApiKey
              - name: get_cards
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/get_cards
                auth:
                  scheme: ApiKey
              - name: create_cards
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/create_cards
                auth:
                  scheme: ApiKey
            instructions: >-
              Read payload from data.* (data.tags, data.totalCards). Do not
              expect tag fields at the top level. Tag counts can overlap because
              one card may have multiple tags. Select the next endpoint from
              instructions and confirm it with actions.
            docs:
              openapiUrl: https://api.flashcards-open-source-app.com/v1/agent/openapi.json
              swaggerUrl: https://api.flashcards-open-source-app.com/v1/agent/swagger.json
    default:
      description: Agent error envelope
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentErrorEnvelope.yaml
