post:
  tags:
    - tools
  summary: List decks
  description: Lists decks from the selected workspace.
  security:
    - ApiKeyHeader: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CursorPageInput.yaml
  responses:
    '200':
      description: Decks listed
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentListDecksEnvelope.yaml
          example:
            ok: true
            data:
              decks:
                - deckId: db4e9fa3-6e56-4355-a35d-58bb0ef6f0e9
                  workspaceId: 50b5b928-7f04-4cc8-878d-6cd0e8b98474
                  name: Distributed Systems
                  filterDefinition:
                    version: 2
                    effortLevels:
                      - fast
                    tags:
                      - distributed-systems
                  createdAt: '2026-03-10T10:00:00.000Z'
                  clientUpdatedAt: '2026-03-10T10:00:00.000Z'
                  lastModifiedByDeviceId: 58d59a91-3210-4581-ac3a-0f850f0ced6f
                  lastOperationId: agent-deck-op-1
                  updatedAt: '2026-03-10T10:00:00.000Z'
                  deletedAt: null
              nextCursor: null
            actions:
              - name: list_tools
                method: GET
                url: https://api.flashcards-open-source-app.com/v1/agent/tools
                auth:
                  scheme: ApiKey
              - name: search_decks
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/search_decks
                auth:
                  scheme: ApiKey
              - name: get_decks
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/get_decks
                auth:
                  scheme: ApiKey
              - name: create_decks
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/create_decks
                auth:
                  scheme: ApiKey
            instructions: >-
              Read payload from data.* (data.decks, data.nextCursor). Do not
              expect decks at the top level. For paginated responses, pass
              data.nextCursor back unchanged as the cursor query parameter or
              JSON field and stop when data.nextCursor is null. Select the next
              endpoint from instructions and confirm it with actions.
            docs:
              openapiUrl: https://api.flashcards-open-source-app.com/v1/agent/openapi.json
              swaggerUrl: https://api.flashcards-open-source-app.com/v1/agent/swagger.json
    default:
      description: Agent error envelope
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentErrorEnvelope.yaml
