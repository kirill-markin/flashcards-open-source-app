get:
  tags:
    - bootstrap
  summary: Load agent account context
  description: >-
    Returns the authenticated user profile, the currently selected workspace id
    for this API key connection, and explicit next-step bootstrap instructions.
  security:
    - ApiKeyHeader: []
  responses:
    '200':
      description: Agent account envelope
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentAccountEnvelope.yaml
          example:
            ok: true
            data:
              userId: user-1
              selectedWorkspaceId: 50b5b928-7f04-4cc8-878d-6cd0e8b98474
              authTransport: api_key
              profile:
                email: kirill@example.com
                locale: en
                createdAt: '2026-03-07T10:40:54.589Z'
            instructions: >-
              Next call GET /v1/agent/workspaces?limit=100 to inspect available
              workspaces for this API key. If data.nextCursor is not null,
              continue with the same endpoint and cursor=data.nextCursor until
              it becomes null. If no workspace is selected, call POST
              /v1/agent/workspaces/{workspaceId}/select. After a workspace is
              selected, use POST /v1/agent/sql for reads, writes, and SQL
              introspection. For routine low-risk writes, a clear user request
              already counts as permission. Ask again only for risky or unclear
              actions. Read payload from data.* and use docs.openapiUrl for the
              full contract.
            docs:
              openapiUrl: https://api.flashcards-open-source-app.com/v1/agent/openapi.json
    default:
      description: Agent error envelope
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentErrorEnvelope.yaml
