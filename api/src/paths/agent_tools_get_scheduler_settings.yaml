post:
  tags:
    - tools
  summary: Get scheduler settings
  description: Loads scheduler settings for the selected workspace.
  security:
    - ApiKeyHeader: []
  responses:
    '200':
      description: Scheduler settings loaded
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentGetSchedulerSettingsEnvelope.yaml
          example:
            ok: true
            data:
              schedulerSettings:
                algorithm: fsrs-6
                desiredRetention: 0.9
                learningStepsMinutes:
                  - 1
                  - 10
                relearningStepsMinutes:
                  - 10
                maximumIntervalDays: 36500
                enableFuzz: true
                clientUpdatedAt: '2026-03-11T08:50:55.898Z'
                lastModifiedByDeviceId: 58d59a91-3210-4581-ac3a-0f850f0ced6f
                lastOperationId: workspace-settings-op-1
                updatedAt: '2026-03-11T08:50:55.898Z'
            actions:
              - name: list_tools
                method: GET
                url: https://api.flashcards-open-source-app.com/v1/agent/tools
                auth:
                  scheme: ApiKey
              - name: get_workspace_context
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/get_workspace_context
                auth:
                  scheme: ApiKey
              - name: get_scheduler_settings
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/get_scheduler_settings
                auth:
                  scheme: ApiKey
              - name: list_due_cards
                method: POST
                url: >-
                  https://api.flashcards-open-source-app.com/v1/agent/tools/list_due_cards
                auth:
                  scheme: ApiKey
            instructions: >-
              Read payload from data.* (data.schedulerSettings). Do not expect
              scheduler settings at the top level. Select the next endpoint from
              instructions and confirm it with actions.
            docs:
              openapiUrl: https://api.flashcards-open-source-app.com/v1/agent/openapi.json
              swaggerUrl: https://api.flashcards-open-source-app.com/v1/agent/swagger.json
    default:
      description: Agent error envelope
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AgentErrorEnvelope.yaml
