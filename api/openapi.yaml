{
  "openapi": "3.1.0",
  "info": {
    "title": "Flashcards Open Source App External AI-Agent API",
    "version": "v1",
    "description": "Public machine-facing contract for external AI agents. This document intentionally excludes first-party/internal routes such as sync transport, local chat runtime endpoints, and human-only agent connection management even when those routes remain live for web or iOS clients."
  },
  "servers": [
    {
      "url": "https://api.flashcards-open-source-app.com/v1",
      "description": "Canonical API host for discovery, bootstrap, docs, and external agent tools"
    },
    {
      "url": "https://auth.flashcards-open-source-app.com",
      "description": "Auth host for email OTP bootstrap"
    }
  ],
  "tags": [
    {
      "name": "discovery",
      "description": "Entry points and documentation aliases for the external AI-agent contract."
    },
    {
      "name": "auth",
      "description": "Email OTP bootstrap on the auth host. These routes issue long-lived ApiKey credentials."
    },
    {
      "name": "bootstrap",
      "description": "Agent-oriented account and workspace bootstrap after ApiKey authentication, including per-connection workspace selection."
    },
    {
      "name": "tools",
      "description": "Compact bulk-friendly tool endpoints for the selected workspace. Internal sync mechanics stay server-side and are not part of this public contract."
    }
  ],
  "paths": {
    "/": {
      "get": {
        "tags": [
          "discovery"
        ],
        "summary": "Discovery alias",
        "description": "Primary discovery entrypoint. Returns the same compact envelope as GET /agent.",
        "responses": {
          "200": {
            "description": "Agent discovery envelope",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AgentDiscoveryEnvelope"
                },
                "example": {
                  "ok": true,
                  "data": {
                    "service": {
                      "name": "flashcards-open-source-app",
                      "version": "v1",
                      "description": "Offline-first flashcards service with user-owned workspaces and AI-friendly API onboarding."
                    },
                    "authentication": {
                      "type": "email_otp_then_api_key",
                      "registerAndLogin": "Ask which email the user wants to use, then start the same flow for both new and existing users."
                    },
                    "capabilitiesAfterLogin": [
                      "Load account context",
                      "Select a workspace",
                      "Read and write cards and decks"
                    ],
                    "authBaseUrl": "https://auth.flashcards-open-source-app.com",
                    "apiBaseUrl": "https://api.flashcards-open-source-app.com/v1",
                    "docs": {
                      "openapiUrl": "https://api.flashcards-open-source-app.com/v1/agent/openapi.json",
                      "swaggerUrl": "https://api.flashcards-open-source-app.com/v1/agent/swagger.json"
                    }
                  },
                  "actions": [
                    {
                      "name": "send_code",
                      "method": "POST",
                      "url": "https://auth.flashcards-open-source-app.com/api/agent/send-code",
                      "input": {
                        "required": [
                          "email"
                        ]
                      }
                    },
                    {
                      "name": "openapi",
                      "method": "GET",
                      "url": "https://api.flashcards-open-source-app.com/v1/agent/openapi.json"
                    }
                  ],
                  "instructions": "Start with send_code. After login, call https://api.flashcards-open-source-app.com/v1/agent/me, then https://api.flashcards-open-source-app.com/v1/agent/workspaces?limit=100. A first workspace is auto-provisioned for new users. For paginated responses, pass data.nextCursor back unchanged as the cursor query parameter or JSON field and stop when data.nextCursor is null. Read payload from data.* (for example, data.workspaces). Do not expect resource fields at the top level. Select the next endpoint from instructions and confirm it with actions.",
                  "docs": {
                    "openapiUrl": "https://api.flashcards-open-source-app.com/v1/agent/openapi.json",
                    "swaggerUrl": "https://api.flashcards-open-source-app.com/v1/agent/swagger.json"
                  }
                }
              }
            }
          }
        }
      }
    },
    "/agent": {
