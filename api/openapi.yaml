                    {
                      "name": "create_cards",
                      "method": "POST",
                      "url": "https://api.flashcards-open-source-app.com/v1/agent/tools/create_cards",
                      "auth": {
                        "scheme": "ApiKey"
                      }
                    }
                  ],
                  "instructions": "Workspace bootstrap is complete. Read payload from data.* (data.workspaces, data.nextCursor). Do not expect workspaces at the top level. For paginated responses, pass data.nextCursor back unchanged as the cursor query parameter or JSON field and stop when data.nextCursor is null. Select next endpoint from instructions and confirm with actions: GET https://api.flashcards-open-source-app.com/v1/agent/tools then POST https://api.flashcards-open-source-app.com/v1/agent/tools/get_workspace_context.",
                  "docs": {
                    "openapiUrl": "https://api.flashcards-open-source-app.com/v1/agent/openapi.json",
                    "swaggerUrl": "https://api.flashcards-open-source-app.com/v1/agent/swagger.json"
                  }
                }
              }
            }
          },
          "default": {
            "description": "Agent error envelope",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AgentErrorEnvelope"
                }
              }
            }
          }
        }
      },
