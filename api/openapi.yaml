    "/api/agent/send-code": {
      "post": {
        "tags": [
          "auth"
        ],
        "summary": "Send OTP code",
        "description": "Starts the external AI-agent auth flow by emailing an 8-digit OTP code and returning a short opaque otpSessionToken.",
        "servers": [
          {
            "url": "https://auth.flashcards-open-source-app.com",
            "description": "Auth host for email OTP bootstrap"
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/AgentSendCodeInput"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "OTP challenge created",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AgentSendCodeEnvelope"
                },
                "example": {
                  "ok": true,
                  "data": {
                    "email": "user@example.com",
                    "otpSessionToken": "ABCD-EFGH-IJKL-MNPQ-1234",
                    "expiresInSeconds": 180,
                    "authBaseUrl": "https://auth.flashcards-open-source-app.com",
                    "apiBaseUrl": "https://api.flashcards-open-source-app.com/v1"
                  },
                  "actions": [
                    {
                      "name": "verify_code",
                      "method": "POST",
                      "url": "https://auth.flashcards-open-source-app.com/api/agent/verify-code",
                      "input": {
                        "required": [
                          "code",
                          "otpSessionToken",
                          "label"
                        ]
                      }
                    }
                  ],
                  "instructions": "A verification code has been sent. Read payload from data.* (data.otpSessionToken). Do not expect OTP fields at the top level. Use instructions to pick the next call and confirm with actions.",
                  "docs": {
                    "openapiUrl": "https://api.flashcards-open-source-app.com/v1/agent/openapi.json",
                    "swaggerUrl": "https://api.flashcards-open-source-app.com/v1/agent/swagger.json"
                  }
                }
              }
            }
          }
        }
      }
    },
    "/api/agent/verify-code": {
      "post": {
        "tags": [
          "auth"
        ],
        "summary": "Verify OTP code and issue API key",
        "description": "Completes email OTP authentication and returns a long-lived ApiKey plus a connection descriptor for the external AI agent, followed by explicit account/workspace bootstrap actions.",
        "servers": [
          {
            "url": "https://auth.flashcards-open-source-app.com",
            "description": "Auth host for email OTP bootstrap"
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/AgentVerifyCodeInput"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "API key issued",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AgentVerifyCodeEnvelope"
                },
                "example": {
                  "ok": true,
                  "data": {
                    "apiKey": "fca_ABCDEFGH_0123456789ABCDEFGHJKMNPQRS",
                    "authorizationScheme": "ApiKey",
                    "apiBaseUrl": "https://api.flashcards-open-source-app.com/v1",
                    "connection": {
                      "connectionId": "connection-1",
                      "label": "codex-import-bot",
                      "createdAt": "2026-03-11T08:55:00.000Z",
                      "lastUsedAt": null,
                      "revokedAt": null
                    }
                  },
                  "actions": [
                    {
                      "name": "load_account",
                      "method": "GET",
                      "url": "https://api.flashcards-open-source-app.com/v1/agent/me",
                      "auth": {
                        "scheme": "ApiKey"
                      }
                    },
                    {
                      "name": "list_workspaces",
                      "method": "GET",
                      "url": "https://api.flashcards-open-source-app.com/v1/agent/workspaces?limit=100",
                      "auth": {
                        "scheme": "ApiKey"
                      }
                    },
                    {
                      "name": "create_workspace",
                      "method": "POST",
                      "url": "https://api.flashcards-open-source-app.com/v1/agent/workspaces",
                      "input": {
                        "required": [
                          "name"
                        ]
                      },
                      "auth": {
                        "scheme": "ApiKey"
                      }
                    },
                    {
                      "name": "select_workspace",
                      "method": "POST",
                      "urlTemplate": "https://api.flashcards-open-source-app.com/v1/agent/workspaces/{workspaceId}/select",
                      "input": {
                        "required": [
                          "workspaceId"
                        ]
                      },
                      "auth": {
                        "scheme": "ApiKey"
                      }
                    }
                  ],
                  "instructions": "Store this API key securely. Read payload from data.* (data.apiKey, data.connection). Do not expect resource fields at the top level. Select next calls from instructions and confirm with actions: GET https://api.flashcards-open-source-app.com/v1/agent/me, GET https://api.flashcards-open-source-app.com/v1/agent/workspaces?limit=100, then select a workspace if needed. For paginated responses, pass data.nextCursor back unchanged as the cursor query parameter or JSON field and stop when data.nextCursor is null. The first workspace is auto-provisioned for new users; use create only for additional workspaces.",
                  "docs": {
                    "openapiUrl": "https://api.flashcards-open-source-app.com/v1/agent/openapi.json",
                    "swaggerUrl": "https://api.flashcards-open-source-app.com/v1/agent/swagger.json"
                  }
                }
              }
            }
          }
        }
      }
    },
    "/agent/me": {
      "get": {
        "tags": [
          "bootstrap"
        ],
        "summary": "Load agent account context",
        "description": "Returns the authenticated user profile, the currently selected workspace id for this API key connection, and explicit next-step bootstrap actions.",
        "security": [
          {
            "ApiKeyHeader": []
          }
        ],
        "responses": {
          "200": {
            "description": "Agent account envelope",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AgentAccountEnvelope"
                },
                "example": {
                  "ok": true,
                  "data": {
                    "userId": "user-1",
                    "selectedWorkspaceId": "50b5b928-7f04-4cc8-878d-6cd0e8b98474",
                    "authTransport": "api_key",
                    "profile": {
                      "email": "kirill@example.com",
                      "locale": "en",
                      "createdAt": "2026-03-07T10:40:54.589Z"
                    }
                  },
                  "actions": [
                    {
                      "name": "list_workspaces",
                      "method": "GET",
                      "url": "https://api.flashcards-open-source-app.com/v1/agent/workspaces?limit=100",
                      "auth": {
                        "scheme": "ApiKey"
                      }
                    }
                  ],
                  "instructions": "Call GET https://api.flashcards-open-source-app.com/v1/agent/workspaces?limit=100 next. A first workspace is auto-provisioned for new users. For paginated responses, pass data.nextCursor back unchanged as the cursor query parameter or JSON field and stop when data.nextCursor is null. Read payload from data.* (for this endpoint: data.selectedWorkspaceId, data.profile). Do not expect account fields at the top level. Select the next endpoint from instructions and confirm it with actions.",
                  "docs": {
                    "openapiUrl": "https://api.flashcards-open-source-app.com/v1/agent/openapi.json",
                    "swaggerUrl": "https://api.flashcards-open-source-app.com/v1/agent/swagger.json"
                  }
                }
              }
            }
          },
          "default": {
            "description": "Agent error envelope",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AgentErrorEnvelope"
                }
              }
            }
          }
        }
      }
    },
    "/agent/workspaces": {
      "get": {
        "tags": [
          "bootstrap"
        ],
        "summary": "List workspaces for the external agent",
        "description": "Lists the user's workspaces in an agent-oriented envelope and points the caller to either create a workspace, select one for the current API key connection, or continue to tools.",
        "parameters": [
          {
            "name": "limit",
            "in": "query",
            "required": true,
            "schema": {
              "$ref": "#/components/schemas/PageLimit"
            },
            "description": "Explicit page size. Start with 100."
          },
          {
            "name": "cursor",
            "in": "query",
            "required": false,
            "schema": {
              "anyOf": [
                {
                  "$ref": "#/components/schemas/OpaqueCursor"
                },
                {
                  "type": "null"
                }
              ]
            },
            "description": "Opaque cursor from the previous page. Start with null or omit it on the first request."
          }
        ],
        "security": [
          {
            "ApiKeyHeader": []
          }
        ],
        "responses": {
          "200": {
            "description": "Agent workspaces envelope",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AgentWorkspacesEnvelope"
                },
                "example": {
                  "ok": true,
                  "data": {
                    "workspaces": [
                      {
                        "workspaceId": "50b5b928-7f04-4cc8-878d-6cd0e8b98474",
                        "name": "Kirill Flashcards",
                        "createdAt": "2026-03-11T08:50:55.898Z",
                        "isSelected": true
                      }
                    ],
                    "nextCursor": null
                  },
                  "actions": [
                    {
                      "name": "list_tools",
                      "method": "GET",
                      "url": "https://api.flashcards-open-source-app.com/v1/agent/tools",
                      "auth": {
                        "scheme": "ApiKey"
                      }
                    },
                    {
                      "name": "get_workspace_context",
                      "method": "POST",
                      "url": "https://api.flashcards-open-source-app.com/v1/agent/tools/get_workspace_context",
                      "auth": {
                        "scheme": "ApiKey"
                      }
                    },
                    {
                      "name": "search_cards",
                      "method": "POST",
                      "url": "https://api.flashcards-open-source-app.com/v1/agent/tools/search_cards",
                      "auth": {
                        "scheme": "ApiKey"
                      }
