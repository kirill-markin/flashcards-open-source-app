services:
  postgres:
    image: postgres:18.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: flashcards_owner
      POSTGRES_PASSWORD: flashcards_owner
      POSTGRES_DB: flashcards
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashcards_owner"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    image: postgres:18.4
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MIGRATION_DATABASE_URL: ${MIGRATION_DATABASE_URL:-postgresql://flashcards_owner:flashcards_owner@postgres:5432/flashcards}
      BACKEND_DB_PASSWORD: ${BACKEND_DB_PASSWORD:-backend_app}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD:-auth_app}
      REPORTING_DB_PASSWORD: ${REPORTING_DB_PASSWORD:-reporting_readonly}
    volumes:
      - ../../scripts:/scripts:ro
      - ../../db:/db:ro
    entrypoint: ["bash", "/scripts/migrate.sh"]
    restart: "no"

  auth:
    build:
      context: ../../apps/auth
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      NODE_ENV: development
      ALLOWED_REDIRECT_URIS: "http://localhost:3000"
      COOKIE_DOMAIN: "localhost"
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID:-}
      COGNITO_REGION: ${COGNITO_REGION:-}
      SESSION_ENCRYPTION_KEY: ${SESSION_ENCRYPTION_KEY:-}
      DEMO_EMAIL_DOSTIP: ${DEMO_EMAIL_DOSTIP:-}
      DEMO_PASSWORD_DOSTIP: ${DEMO_PASSWORD_DOSTIP:-}

volumes:
  pgdata:
